<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Форми</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>

<!-- 🔹 Форма логіну (як у тебе зверху) -->
<nav>
    <form action="#">
        <input type="text" placeholder="Логін" required>
        <input type="password" placeholder="Пароль" required>
        <input type="submit" value="Увійти">
    </form>
</nav>

<hr>

<!-- 🔹 Форма коментаря (як у тебе по центру) -->
<h1 style="text-align:center;">Коментар</h1>

<form action="#">
    <div>
        <label>
            <span>Ім’я:</span>
            <input type="text" required>
        </label>
    </div>

    <div>
        <label>
            <span>Email:</span>
            <input type="email" required>
        </label>
    </div>

    <div>
        <label>
            <span>Коментар:</span>
            <textarea required></textarea>
        </label>
    </div>

    <div>
        <button type="submit">Надіслати</button>
    </div>
</form>

</body>
</html>
