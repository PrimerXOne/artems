<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Форма</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>

<form action="#">
  <h1>Коментар</h1>

  <div>
    <label>
      <span>Ім’я:</span>
      <input type="text" required>
    </label>
  </div>

  <div>
    <label>
      <span>Email:</span>
      <input type="email" required>
    </label>
  </div>

  <div>
    <label>
      <span>Коментар:</span>
      <textarea required></textarea>
    </label>
  </div>

  <div>
    <button type="submit">Надіслати</button>
  </div>

</form>

</body>
</html>
